name: finalboarding
description: "Bacolod Boarding Guard - Safe. Verified. Affordable."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  google_fonts: ^6.2.1

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^17.1.0

  # Firebase Core, Auth, & Database
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.1
  cloud_firestore: ^6.1.2

  # Storage & Media
  firebase_storage: ^13.0.6
  image_picker: ^1.2.1

  # Local Storage & Utilities
  shared_preferences: ^2.5.4
  dio: ^5.8.0
  http: ^1.3.0

  # Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^11.0.0
  camera: ^0.11.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - public/images/logo.png